name: Update Notion widget

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Notion data
        run: node scripts/fetch-notion.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_MILESTONES_DATABASE_ID: ${{ vars.NOTION_MILESTONES_DATABASE_ID }}
          NOTION_MILESTONES_DATA_SOURCE_ID: ${{ vars.NOTION_MILESTONES_DATA_SOURCE_ID }}
          NOTION_MILESTONE_TITLE_PROPERTY: ${{ vars.NOTION_MILESTONE_TITLE_PROPERTY }}
          NOTION_MILESTONE_PROJECT_PROPERTY: ${{ vars.NOTION_MILESTONE_PROJECT_PROPERTY }}
          NOTION_MILESTONE_DATE_PROPERTY: ${{ vars.NOTION_MILESTONE_DATE_PROPERTY }}
          NOTION_MILESTONE_START_PROPERTY: ${{ vars.NOTION_MILESTONE_START_PROPERTY }}
          NOTION_MILESTONE_END_PROPERTY: ${{ vars.NOTION_MILESTONE_END_PROPERTY }}

      - name: Prepare static site
        run: |
          mkdir -p _site/data
          cp index.html styles.css app.js _site/
          cp data/milestones.json _site/data/milestones.json

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
